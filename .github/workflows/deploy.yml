name: Deploy to VPS I8

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync config files (docker-compose, README)
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='wp-content/' \
            --exclude='data/' \
            --exclude='.env' \
            --exclude='*.sql' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/fiber-emballage/

      - name: Sync active theme
        run: |
          rsync -avz --delete \
            wp-content/themes/twentytwentyfour/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/fiber-emballage/data/wordpress/wp-content/themes/twentytwentyfour/

      - name: Sync mu-plugins
        run: |
          rsync -avz --delete \
            wp-content/mu-plugins/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/fiber-emballage/data/wordpress/wp-content/mu-plugins/

      - name: Fix permissions and reload Apache
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            chown -R 33:33 /opt/fiber-emballage/data/wordpress/wp-content/themes/twentytwentyfour
            chown -R 33:33 /opt/fiber-emballage/data/wordpress/wp-content/mu-plugins
            docker exec fiber-wp apachectl graceful 2>/dev/null || docker restart fiber-wp
          ENDSSH
