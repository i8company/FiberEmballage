<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 476" width="340" height="476">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A1505"/>
      <stop offset="60%" style="stop-color:#3D2B1F"/>
      <stop offset="100%" style="stop-color:#4A2F18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C97A"/>
      <stop offset="100%" style="stop-color:#C9A97A"/>
    </linearGradient>
    <linearGradient id="cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F0E6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EDE0CC;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="340" height="476" fill="url(#bg)"/>

  <!-- Subtle texture dots -->
  <g opacity="0.04">
    <circle cx="20" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="60" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="100" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="140" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="180" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="220" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="260" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="300" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="340" cy="20" r="1.5" fill="#C9A97A"/>
    <circle cx="20" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="60" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="100" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="140" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="180" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="220" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="260" cy="60" r="1.5" fill="#C9A97A"/>
    <circle cx="300" cy="60" r="1.5" fill="#C9A97A"/>
  </g>

  <!-- Top decorative border line -->
  <rect x="26" y="26" width="288" height="424" rx="4" fill="none" stroke="#C9A97A" stroke-width="1" opacity="0.3"/>
  <rect x="30" y="30" width="280" height="416" rx="3" fill="none" stroke="#C9A97A" stroke-width="0.5" opacity="0.2"/>

  <!-- Decorative yarn ball top-right -->
  <g transform="translate(255, 80)" opacity="0.85" filter="url(#softglow)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#C9A97A" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="42" fill="#8B6133" opacity="0.25"/>
    <!-- Yarn wrapping lines -->
    <ellipse cx="0" cy="0" rx="42" ry="15" fill="none" stroke="#C9A97A" stroke-width="1" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="42" ry="28" fill="none" stroke="#C9A97A" stroke-width="0.8" opacity="0.4" transform="rotate(40)"/>
    <ellipse cx="0" cy="0" rx="42" ry="28" fill="none" stroke="#C9A97A" stroke-width="0.8" opacity="0.4" transform="rotate(-40)"/>
    <ellipse cx="0" cy="0" rx="42" ry="20" fill="none" stroke="#E8C97A" stroke-width="0.6" opacity="0.35" transform="rotate(70)"/>
    <ellipse cx="0" cy="0" rx="42" ry="20" fill="none" stroke="#E8C97A" stroke-width="0.6" opacity="0.35" transform="rotate(-70)"/>
    <!-- Yarn tail -->
    <path d="M 42 0 Q 65 -15 75 30 Q 80 55 60 70" fill="none" stroke="#C9A97A" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Decorative yarn ball bottom-left -->
  <g transform="translate(68, 370)" opacity="0.6">
    <circle cx="0" cy="0" r="30" fill="#6B3E1A" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="none" stroke="#C9A97A" stroke-width="1" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="none" stroke="#C9A97A" stroke-width="0.8" opacity="0.3" transform="rotate(50)"/>
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="none" stroke="#C9A97A" stroke-width="0.8" opacity="0.3" transform="rotate(-50)"/>
    <path d="M -30 0 Q -50 10 -55 -20" fill="none" stroke="#C9A97A" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Flowing thread lines -->
  <path d="M 0 160 Q 80 140 160 170 Q 240 200 340 175" fill="none" stroke="#C9A97A" stroke-width="0.6" opacity="0.2"/>
  <path d="M 0 165 Q 90 148 170 176 Q 250 204 340 180" fill="none" stroke="#C9A97A" stroke-width="0.4" opacity="0.15"/>

  <!-- Botanical leaf left -->
  <g transform="translate(45, 210)" opacity="0.5">
    <path d="M 0 0 Q -18 -30 0 -60 Q 8 -30 0 0 Z" fill="#C9A97A" opacity="0.4"/>
    <path d="M 0 0 Q 15 -25 8 -55 Q 2 -28 0 0 Z" fill="#C9A97A" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#C9A97A" stroke-width="0.8" opacity="0.5"/>
  </g>
  <g transform="translate(58, 225)" opacity="0.35">
    <path d="M 0 0 Q -12 -20 0 -40 Q 5 -20 0 0 Z" fill="#E8C97A" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#E8C97A" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Botanical leaf right bottom -->
  <g transform="translate(295, 330) rotate(20)" opacity="0.4">
    <path d="M 0 0 Q -14 -24 0 -48 Q 6 -24 0 0 Z" fill="#C9A97A" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="-48" stroke="#C9A97A" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- Label badge -->
  <rect x="100" y="52" width="140" height="24" rx="12" fill="none" stroke="#C9A97A" stroke-width="1" opacity="0.5"/>
  <text x="170" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#C9A97A" letter-spacing="2" opacity="0.9">FIBER EMBALLAGE</text>

  <!-- Main title area -->
  <text x="170" y="125" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#C9A97A" letter-spacing="3" opacity="0.8">DOSSIÊ</text>

  <!-- Big decorative title -->
  <text x="170" y="165" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="url(#cream)" font-style="italic" letter-spacing="-1">Fios</text>
  <text x="170" y="198" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#C9A97A" letter-spacing="4">&amp;</text>
  <text x="170" y="238" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="url(#cream)" font-style="italic" letter-spacing="-1">Fibras</text>

  <!-- Divider ornament -->
  <line x1="90" y1="258" x2="150" y2="258" stroke="#C9A97A" stroke-width="0.8" opacity="0.5"/>
  <circle cx="170" cy="258" r="3" fill="#C9A97A" opacity="0.7"/>
  <line x1="190" y1="258" x2="250" y2="258" stroke="#C9A97A" stroke-width="0.8" opacity="0.5"/>

  <!-- Subtitle text -->
  <text x="170" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#F7F0E6" opacity="0.75" letter-spacing="0.5">Guia completo de fibras naturais,</text>
  <text x="170" y="302" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#F7F0E6" opacity="0.75" letter-spacing="0.5">sintéticas e como escolher o fio certo</text>

  <!-- Small yarn motifs center decoration -->
  <g transform="translate(170, 338)" opacity="0.5">
    <circle cx="-22" cy="0" r="10" fill="none" stroke="#C9A97A" stroke-width="0.8"/>
    <ellipse cx="-22" cy="0" rx="10" ry="3.5" fill="none" stroke="#C9A97A" stroke-width="0.6"/>
    <ellipse cx="-22" cy="0" rx="10" ry="6" fill="none" stroke="#C9A97A" stroke-width="0.5" transform="rotate(60,-22,0)"/>
    <circle cx="22" cy="0" r="10" fill="none" stroke="#C9A97A" stroke-width="0.8"/>
    <ellipse cx="22" cy="0" rx="10" ry="3.5" fill="none" stroke="#C9A97A" stroke-width="0.6"/>
    <ellipse cx="22" cy="0" rx="10" ry="6" fill="none" stroke="#C9A97A" stroke-width="0.5" transform="rotate(-60,22,0)"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#E8C97A" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="7" ry="2.5" fill="none" stroke="#E8C97A" stroke-width="0.6"/>
    <!-- connecting threads -->
    <path d="M -12 -3 Q 0 -8 12 -3" fill="none" stroke="#C9A97A" stroke-width="0.6" stroke-linecap="round"/>
    <path d="M -12 3 Q 0 8 12 3" fill="none" stroke="#C9A97A" stroke-width="0.6" stroke-linecap="round"/>
  </g>

  <!-- Author name -->
  <text x="170" y="408" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C9A97A" letter-spacing="1.5">Alana Morais</text>

  <!-- Bottom line decoration -->
  <line x1="60" y1="418" x2="280" y2="418" stroke="#C9A97A" stroke-width="0.5" opacity="0.3"/>

  <!-- Free badge area hint at bottom -->
  <text x="170" y="436" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8.5" fill="#C9A97A" letter-spacing="2" opacity="0.6">MATERIAL GRATUITO</text>
</svg>
